name: PDH-PDL Backtest

on:
  workflow_dispatch:        # manual trigger from the Actions tab
  # schedule:
  #   - cron: "30 3 * * 1-5"   # uncomment to run automatically, 9:00 AM IST on weekdays

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restores candle_cache/ and instrument_master.csv from the most
      # recent previous run. GitHub Actions runners are ephemeral, so
      # without this every run would re-download the full historical
      # window again.
      #
      # actions/cache treats an exact key hit as "already saved, nothing
      # to do" and WON'T re-save at the end of the job -- which would
      # freeze the cache forever after the first run. To keep it updating
      # every run, we use a unique key per run (suffixed with run_id) for
      # saving, and rely on restore-keys (prefix match) to pull in the
      # most recent previous run's cache.
      - name: Restore candle cache
        uses: actions/cache@v4
        with:
          path: |
            candle_cache/
            instrument_master.csv
          key: pdh-pdl-candle-cache-${{ github.run_id }}
          restore-keys: |
            pdh-pdl-candle-cache-

      - name: Run backtest
        env:
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_MPIN: ${{ secrets.ANGEL_MPIN }}
        run: python pdh_pdl_backtest.py

      - name: Upload trade log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log
          path: trade_log.csv
          if-no-files-found: warn

